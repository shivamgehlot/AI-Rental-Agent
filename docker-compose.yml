version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rideswift
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    depends_on: [zookeeper]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:secret@postgres:5432/rideswift
      JWT_SECRET_KEY: dev_access_secret_change_me
      JWT_REFRESH_SECRET_KEY: dev_refresh_secret_change_me
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on: [postgres, redis, kafka]

  ai-agents:
    build: ./ai-agents
    ports: ["8001:8001"]
    environment:
      BACKEND_API_URL: http://backend:8000
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral
    depends_on: [backend, postgres, redis, ollama]

  rag-service:
    build: ./rag-service
    ports: ["8002:8002"]
    depends_on: [chroma, minio, ollama]

  slack-bot:
    build: ./slack-bot
    depends_on: [backend, rag-service, kafka]

  frontend:
    build: ./frontend
    ports: ["3000:3000"]

  nginx:
    image: nginx:alpine
    ports: ["80:80", "443:443"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf"]
    depends_on: [backend, frontend, ai-agents, rag-service]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio-data:/data

  chroma:
    image: chromadb/chroma:0.5.5
    ports: ["8010:8000"]
    volumes:
      - chroma-data:/chroma/chroma

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama

  prometheus:
    image: prom/prometheus:v2.54.1
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on: [backend]

  grafana:
    image: grafana/grafana:11.1.4
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]

volumes:
  pgdata:
  grafana-data:
  minio-data:
  chroma-data:
  ollama-data:
